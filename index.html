<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Visage | Command Center</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="scanner-panel">
			<input
				type="text"
				id="scan-path"
				placeholder="Paste absolute path here (e.g. D:\Photos\Archive)"
			/>
			<button id="scan-btn" class="btn" onclick="triggerScan()">
				INITIATE SCAN
			</button>
		</div>

		<div class="tabs">
			<button class="tab active" onclick="switchTab('clusters')">
				MATCHED CLUSTERS
			</button>
			<button class="tab" onclick="switchTab('raw')">RAW DATABASE</button>
		</div>

		<div id="clusters-view" class="view active"></div>

		<div id="raw-view" class="view">
			<div class="grid" id="raw-grid"></div>
		</div>

		<script>
			// INIT
			loadData();

			function switchTab(tab) {
				document
					.querySelectorAll(".tab")
					.forEach((t) => t.classList.remove("active"));
				document
					.querySelectorAll(".view")
					.forEach((v) => v.classList.remove("active"));

				event.target.classList.add("active");
				document.getElementById(tab + "-view").classList.add("active");
			}

			function getImgSrc(cachePath) {
				return `/cache/${cachePath.split(/[\\/]/).pop()}`;
			}

			function loadData() {
				// Load Raw Data
				fetch("/api/data")
					.then((r) => r.json())
					.then((res) => {
						const grid = document.getElementById("raw-grid");
						grid.innerHTML = "";
						Object.keys(res.data).forEach((path) => {
							grid.innerHTML += createCard(path, res.data[path].thumbnail);
						});
					});

				// Load Clusters
				fetch("/api/groups")
					.then((r) => r.json())
					.then((res) => {
						const view = document.getElementById("clusters-view");
						view.innerHTML = "";
						if (res.data.length === 0) {
							view.innerHTML =
								"<p>No matches found yet. Scan more folders.</p>";
							return;
						}

						res.data.forEach((group, index) => {
							let html = `<div class="cluster-row">
                                  <div class="cluster-header">TARGET ${index + 1} (Found in ${group.length} folders)</div>
                                  <div class="cluster-grid">`;
							group.forEach((node) => {
								html += createCard(node.path, node.thumbnail);
							});
							html += `</div></div>`;
							view.innerHTML += html;
						});
					});
			}

			function createCard(path, thumbnailPath) {
				const cleanPath = path.replace(/\\/g, "\\\\");
				return `
                <div class="card">
                    <img src="${getImgSrc(thumbnailPath)}" class="thumbnail">
                    <div class="path-text">${path.split("\\").pop()}</div>
                    <button class="btn" onclick="openFolder('${cleanPath}')" style="width:100%; font-size: 0.8rem;">OPEN</button>
                </div>
            `;
			}

			function openFolder(path) {
				fetch("/api/open-folder", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ path: path }),
				});
			}

			function triggerScan() {
				const pathInput = document.getElementById("scan-path").value;
				const btn = document.getElementById("scan-btn");

				if (!pathInput) return alert("Enter a path first.");

				btn.disabled = true;
				btn.innerText = "SCANNING... CHECK TERMINAL";

				fetch("/api/scan", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ path: pathInput }),
				})
					.then((res) => res.json())
					.then((res) => {
						btn.disabled = false;
						btn.innerText = "INITIATE SCAN";
						if (res.status === "success") {
							alert("Scan complete! Data updated.");
							loadData(); // Reload UI
						} else {
							alert("Error: " + res.message);
						}
					})
					.catch(() => {
						btn.disabled = false;
						btn.innerText = "INITIATE SCAN";
						alert("Server disconnected or crashed.");
					});
			}
		</script>
	</body>
</html>
