<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Visage | Cluster Dashboard</title>
		<style>
			:root {
				--bg: #0f172a;
				--glass: rgba(255, 255, 255, 0.05);
				--border: rgba(255, 255, 255, 0.1);
				--accent: #38bdf8;
				--text: #e2e8f0;
			}
			body {
				min-height: 100dvh;
				background-color: var(--bg);
				color: var(--text);
				font-family: "Segoe UI", system-ui, sans-serif;
				margin: 0;
				padding: 2rem;
				background-image: radial-gradient(
					circle at top right,
					#1e293b,
					transparent 40%
				);
			}
			header {
				margin-bottom: 3rem;
				border-bottom: 1px solid var(--border);
				padding-bottom: 1rem;
			}
			h1 {
				margin: 0;
				font-weight: 300;
				letter-spacing: 2px;
			}
			span.accent {
				color: var(--accent);
				font-weight: 600;
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
				gap: 1.5rem;
			}

			/* Glassmorphism Card */
			.card {
				background: var(--glass);
				backdrop-filter: blur(10px);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 1rem;
				transition:
					transform 0.2s,
					border-color 0.2s;
				display: flex;
				flex-direction: column;
				align-items: center;
			}
			.card:hover {
				transform: translateY(-5px);
				border-color: var(--accent);
			}

			.thumbnail {
				width: 150px;
				height: 150px;
				object-fit: cover;
				border-radius: 50%;
				border: 2px solid var(--border);
				margin-bottom: 1rem;
			}

			.path-text {
				font-size: 0.8rem;
				color: #94a3b8;
				word-break: break-all;
				text-align: center;
				margin-bottom: 1rem;
				flex-grow: 1;
			}

			.btn {
				background: transparent;
				color: var(--accent);
				border: 1px solid var(--accent);
				padding: 0.5rem 1rem;
				border-radius: 6px;
				cursor: pointer;
				font-weight: 600;
				transition: all 0.2s;
				width: 100%;
			}
			.btn:hover {
				background: var(--accent);
				color: var(--bg);
			}
		</style>
	</head>
	<body>
		<header>
			<h1>VISAGE <span class="accent">ENGINE</span></h1>
			<p>Extracted Data Node Sandbox</p>
		</header>

		<div class="grid" id="face-grid"></div>

		<script>
			// Fetch the raw report data from Python
			fetch("/api/data")
				.then((res) => res.json())
				.then((data) => {
					if (data.status === "success") {
						renderGrid(data.data);
					}
				});

			function renderGrid(reportData) {
				const grid = document.getElementById("face-grid");

				// Loop through the dictionary keys (the folder paths)
				Object.keys(reportData).forEach((path) => {
					const node = reportData[path];

					// Format the thumbnail path for the browser
					// e.g. .cache\folder.jpg -> /cache/folder.jpg
					const imgName = node.thumbnail.split(/[\\/]/).pop();
					const imgSrc = `/cache/${imgName}`;

					// Create the glass card
					const card = document.createElement("div");
					card.className = "card";

					card.innerHTML = `
                    <img src="${imgSrc}" class="thumbnail" alt="Face Anchor" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'150\\' height=\\'150\\'><rect width=\\'150\\' height=\\'150\\' fill=\\'%231e293b\\'/></svg>'">
                    <div class="path-text">${path.split("\\").pop()}</div>
                    <button class="btn" onclick="openFolder('${path.replace(/\\/g, "\\\\")}')">INSPECT FOLDER</button>
                `;

					grid.appendChild(card);
				});
			}

			// Trigger the Python backend to open the Windows File Explorer
			function openFolder(folderPath) {
				fetch("/api/open-folder", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ path: folderPath }),
				})
					.then((res) => res.json())
					.then((res) => {
						if (res.status !== "success") alert("Failed to open directory.");
					});
			}
		</script>
	</body>
</html>
