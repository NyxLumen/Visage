<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Visage | macOS Environment</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Visage</h1>
			<p class="subtitle">Clustering & Extraction Engine</p>
		</header>

		<div class="scanner-panel">
			<input
				type="text"
				id="scan-path"
				placeholder="Enter target directory path..."
				autocomplete="off"
			/>
			<button id="scan-btn" class="btn" onclick="triggerScan()">
				Initiate Scan
			</button>
		</div>

		<div class="tabs">
			<button class="tab active" onclick="switchTab('clusters')">
				Matched Clusters
			</button>
			<button class="tab" onclick="switchTab('raw')">Raw Database</button>
		</div>

		<div id="clusters-view" class="view active"></div>

		<div id="raw-view" class="view">
			<div class="grid" id="raw-grid"></div>
		</div>

		<script>
			loadData();

			document
				.getElementById("scan-path")
				.addEventListener("keypress", function (e) {
					if (e.key === "Enter") {
						e.preventDefault();
						triggerScan();
					}
				});

			function switchTab(tab) {
				document
					.querySelectorAll(".tab")
					.forEach((t) => t.classList.remove("active"));
				document
					.querySelectorAll(".view")
					.forEach((v) => v.classList.remove("active"));
				event.target.classList.add("active");
				document.getElementById(tab + "-view").classList.add("active");
			}

			function loadData() {
				fetch("/api/data")
					.then((r) => r.json())
					.then((res) => {
						const grid = document.getElementById("raw-grid");
						grid.innerHTML = "";
						Object.keys(res.data).forEach((path) => {
							grid.innerHTML += createCard(path, res.data[path].thumbnail);
						});
					});

				fetch("/api/groups")
					.then((r) => r.json())
					.then((res) => {
						const view = document.getElementById("clusters-view");
						view.innerHTML = "";
						if (res.data.length === 0) {
							view.innerHTML =
								'<p style="color: var(--text-secondary); text-align: center; margin-top: 3rem;">No matches detected in the current index.</p>';
							return;
						}

						res.data.forEach((group, index) => {
							let html = `<div class="cluster-row">
                                  <div class="cluster-header">
                                      <span>Target ${index + 1}</span>
                                      <span class="cluster-badge">${group.length} Locations</span>
                                  </div>
                                  <div class="cluster-grid">`;
							group.forEach((node) => {
								html += createCard(node.path, node.thumbnail);
							});
							html += `</div></div>`;
							view.innerHTML += html;
						});
					});
			}

			function createCard(path, thumbnailPath) {
				const cleanPath = path.replace(/\\/g, "\\\\");
				const imgSrc = `/cache/${thumbnailPath.split(/[\\/]/).pop()}`;
				return `
                <div class="card">
                    <img src="${imgSrc}" class="thumbnail">
                    <div class="path-text">${path.split("\\").pop()}</div>
                    <button class="btn" onclick="openFolder('${cleanPath}')">Open Folder</button>
                </div>
            `;
			}

			function openFolder(path) {
				fetch("/api/open-folder", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ path: path }),
				});
			}

			function triggerScan() {
				const pathInput = document.getElementById("scan-path").value;
				const btn = document.getElementById("scan-btn");
				const panel = document.querySelector(".scanner-panel");

				if (!pathInput) return;

				btn.disabled = true;
				btn.innerText = "Extracting...";
				panel.classList.add("scanning-active");

				fetch("/api/scan", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify({ path: pathInput }),
				})
					.then((res) => res.json())
					.then((res) => {
						btn.disabled = false;
						btn.innerText = "Initiate Scan";
						panel.classList.remove("scanning-active");
						if (res.status === "success") loadData();
						else alert("Extraction failed: " + res.message);
					})
					.catch(() => {
						btn.disabled = false;
						btn.innerText = "Initiate Scan";
						panel.classList.remove("scanning-active");
					});
			}
		</script>
	</body>
</html>
